version: 2

project_name: tm

builds:
  - main: ./cmd/tm
    binary: tm
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/true-markets/cli/internal/cli.Version={{.Version}} -X github.com/true-markets/cli/internal/cli.CommitSHA={{.ShortCommit}}
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^ci:"

homebrew_casks:
  - name: tm
    repository:
      owner: true-markets
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
      pull_request:
        enabled: true
    homepage: "https://github.com/true-markets/cli"
    description: "Trade crypto from your terminal"
